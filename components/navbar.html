<script>
// Navbar MQ - timer + menú móvil + asistente
(function(){
  const toggle = document.getElementById('mq-nav-toggle-m') || document.getElementById('mq-nav-toggle');
  const menu = document.getElementById('mq-mobile-menu');
  if(toggle && menu){
    toggle.addEventListener('click', ()=>{
      const open = menu.classList.toggle('hidden') === false;
      toggle.setAttribute('aria-expanded', open);
    });
    menu.querySelectorAll('a').forEach(a=>{
      a.addEventListener('click', ()=>{ menu.classList.add('hidden'); toggle.setAttribute('aria-expanded','false'); });
    });
  }
  // Reloj live, reutiliza el del index si ya existe
  function tick(){
    const t = new Date().toTimeString().split(' ')[0];
    document.getElementById('mq-nav-timer') && (document.getElementById('mq-nav-timer').textContent = t);
    document.getElementById('mq-nav-timer-m') && (document.getElementById('mq-nav-timer-m').textContent = t);
    const live = document.getElementById('live-timer');
    if(live) live.textContent = t + ' CORE_OS';
  }
  setInterval(tick, 1000); tick();

  // Abrir asistente - engancha con tu chat flotante
  function openAsistente(e){
    e.preventDefault();
    const frame = document.getElementById('mqBackendChatFrame');
    if(frame){ frame.classList.remove('mq-hidden'); }
    menu && menu.classList.add('hidden');
  }
  document.getElementById('openAsistenteNav')?.addEventListener('click', openAsistente);
  document.getElementById('openAsistenteNavM')?.addEventListener('click', openAsistente);
})();
</script>
